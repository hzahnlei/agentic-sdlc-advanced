# Pipeline calls make targets to keep CI thin and logic in the Makefile.

name: CI

on:
  push:
    branches: ['**']
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

jobs:

  # ── Compile ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - run: make build

  # ── Unit and component tests ───────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - run: make test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: test_reports/tests/
          retention-days: 7

  # ── Code coverage (JaCoCo → Cobertura) ────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: make coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: test_reports/coverage/
          retention-days: 7

  # ── Changelog (tag vX.Y.Z only) ──────────────────────────────────────────
  changelog:
    name: Changelog
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, test, coverage]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install git-cliff
        run: |
          CLIFF_TAG=$(curl -sSfL https://api.github.com/repos/orhun/git-cliff/releases/latest \
            | grep '"tag_name"' | head -1 | cut -d'"' -f4)
          CLIFF_VER="${CLIFF_TAG#v}"
          curl -sSfL "https://github.com/orhun/git-cliff/releases/download/${CLIFF_TAG}/git-cliff-${CLIFF_VER}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz -C /tmp
          sudo install -m 755 $(find /tmp -name 'git-cliff' -type f | head -1) /usr/local/bin/git-cliff
      - name: Update CHANGELOG.md on main
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin main
          git checkout -B main origin/main
          git cliff --tag "${{ github.ref_name }}" -o CHANGELOG.md
          git add CHANGELOG.md
          git diff --cached --quiet || \
            git commit -m "chore(release): update CHANGELOG.md for ${{ github.ref_name }} [skip ci]" && \
            git push origin main

  # ── Docs → GitHub Pages (tag vX.Y.Z only) ─────────────────────────────────
  docs:
    name: Docs
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, test, coverage]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install -r requirements-docs.txt
      - run: mkdocs build --site-dir public
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - uses: actions/deploy-pages@v4
        id: deployment
